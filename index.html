<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Build AI personas, debate in real-time, and share them with the world. Forge — the interactive AI companion platform." />
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Forge — AI Personas, Debates & More</title>
    <!-- Blocking dark-mode init: prevents any flash of light mode -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('forge-theme');
          var theme = stored === 'light' ? 'light' : 'dark';
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.classList.toggle('light', theme === 'light');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* Ensure body is always dark until CSS loads */
      html { background: #0a0a0f; color: #eaeaf0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
